openapi: 3.1.0
info:
  title: Torque Platform API
  description: |
    Torque Agent Runtime Platform API v1.

    Provides CRUD operations for agent definitions, instances, runs, tasks,
    artifacts, teams, delegations, approvals, checkpoints, capabilities,
    events, memory, escalations, and tool policies.

    ## Authentication

    All endpoints require an `X-API-Key` header. Any non-empty value is
    accepted. Sessions and instances are scoped to the key used at creation.

    ## Streaming

    The `/v1/agent-instances/{id}/runs` and `/v1/memory-notifications/sse`
    endpoints return `text/event-stream` (SSE). Every stream terminates with
    exactly one terminal event: `done` or `error`.
  version: 1.0.0
  license:
    name: MIT
    url: https://github.com/0xnicholas/torque/blob/main/LICENSE
  contact:
    name: Torque Team
    url: https://github.com/0xnicholas/torque

servers:
  - url: http://localhost:3000
    description: Local development

security:
  - ApiKeyAuth: []

paths:
  # ================================================================
  # Agent Definitions
  # ================================================================
  /v1/agent-definitions:
    get:
      summary: List agent definitions
      operationId: listAgentDefinitions
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/AgentDefinitionList'
    post:
      summary: Create agent definition
      operationId: createAgentDefinition
      requestBody:
        $ref: '#/components/requestBodies/AgentDefinitionCreate'
      responses:
        '201':
          $ref: '#/components/responses/AgentDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/agent-definitions/{id}:
    get:
      summary: Get agent definition
      operationId: getAgentDefinition
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/AgentDefinition'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete agent definition
      operationId: deleteAgentDefinition
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Agent Instances
  # ================================================================
  /v1/agent-instances:
    get:
      summary: List agent instances
      operationId: listAgentInstances
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/AgentInstanceList'
    post:
      summary: Create agent instance
      operationId: createAgentInstance
      requestBody:
        $ref: '#/components/requestBodies/AgentInstanceCreate'
      responses:
        '201':
          $ref: '#/components/responses/AgentInstance'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/agent-instances/{id}:
    get:
      summary: Get agent instance
      operationId: getAgentInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/AgentInstance'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete agent instance
      operationId: deleteAgentInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/agent-instances/{id}/cancel:
    post:
      summary: Cancel agent instance
      operationId: cancelAgentInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Cancelled successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/agent-instances/{id}/resume:
    post:
      summary: Resume agent instance from SUSPENDED
      operationId: resumeAgentInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Resumed successfully
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/agent-instances/{id}/time-travel:
    post:
      summary: Time travel agent instance to checkpoint
      description: Creates a new branch from the specified checkpoint.
      operationId: timeTravelAgentInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        $ref: '#/components/requestBodies/TimeTravelRequest'
      responses:
        '200':
          description: Time travel initiated
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/agent-instances/{id}/delegations:
    get:
      summary: List delegations for agent instance
      operationId: listAgentInstanceDelegations
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/DelegationList'

  /v1/agent-instances/{id}/artifacts:
    get:
      summary: List artifacts for agent instance
      operationId: listAgentInstanceArtifacts
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/ArtifactList'

  /v1/agent-instances/{id}/events:
    get:
      summary: List events for agent instance
      operationId: listAgentInstanceEvents
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/EventList'

  /v1/agent-instances/{id}/checkpoints:
    get:
      summary: List checkpoints for agent instance
      operationId: listAgentInstanceCheckpoints
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/CheckpointList'

  /v1/agent-instances/{id}/runs:
    post:
      summary: Start a run for agent instance (SSE streaming)
      operationId: runAgentInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        $ref: '#/components/requestBodies/RunRequest'
      responses:
        '200':
          description: SSE stream of run events
          content:
            text/event-stream:
              schema:
                type: string
        '409':
          description: Another run is already active for this instance

  # ================================================================
  # Runs (Standalone)
  # ================================================================
  /v1/runs:
    post:
      summary: Create a standalone run (supports async)
      operationId: createRun
      requestBody:
        $ref: '#/components/requestBodies/RunCreate'
      responses:
        '201':
          $ref: '#/components/responses/Run'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/runs/{id}/webhook:
    get:
      summary: Get webhook delivery status
      operationId: getRunWebhookStatus
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/RunWebhookStatus'
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Tasks
  # ================================================================
  /v1/tasks:
    get:
      summary: List tasks
      operationId: listTasks
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/TaskList'

  /v1/tasks/{id}:
    get:
      summary: Get task
      operationId: getTask
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tasks/{id}/cancel:
    post:
      summary: Cancel task
      operationId: cancelTask
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Cancelled successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tasks/{id}/events:
    get:
      summary: List events for task
      operationId: listTaskEvents
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/EventList'

  /v1/tasks/{id}/approvals:
    get:
      summary: List approvals for task
      operationId: listTaskApprovals
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/ApprovalList'

  /v1/tasks/{id}/delegations:
    get:
      summary: List delegations for task
      operationId: listTaskDelegations
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/DelegationList'

  # ================================================================
  # Artifacts
  # ================================================================
  /v1/artifacts:
    get:
      summary: List artifacts
      operationId: listArtifacts
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/ArtifactList'
    post:
      summary: Create artifact
      operationId: createArtifact
      requestBody:
        $ref: '#/components/requestBodies/ArtifactCreate'
      responses:
        '201':
          $ref: '#/components/responses/Artifact'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/artifacts/{id}:
    get:
      summary: Get artifact
      operationId: getArtifact
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Artifact'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete artifact
      operationId: deleteArtifact
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/artifacts/{id}/content:
    get:
      summary: Get artifact content
      operationId: getArtifactContent
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Artifact content
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/artifacts/{id}/publish:
    post:
      summary: Publish artifact (promotes scope)
      operationId: publishArtifact
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Published successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Events
  # ================================================================
  /v1/events:
    get:
      summary: List events (truth source)
      description: Filterable by resource_type and resource_id query params.
      operationId: listEvents
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
        - name: resource_type
          in: query
          schema:
            type: string
          description: Filter by resource type (agent_instance, task, etc.)
        - name: resource_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by resource UUID
      responses:
        '200':
          $ref: '#/components/responses/EventList'

  # ================================================================
  # Capability Profiles
  # ================================================================
  /v1/capability-profiles:
    get:
      summary: List capability profiles
      operationId: listCapabilityProfiles
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/CapabilityProfileList'
    post:
      summary: Create capability profile
      operationId: createCapabilityProfile
      requestBody:
        $ref: '#/components/requestBodies/CapabilityProfileCreate'
      responses:
        '201':
          $ref: '#/components/responses/CapabilityProfile'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/capability-profiles/{id}:
    get:
      summary: Get capability profile
      operationId: getCapabilityProfile
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/CapabilityProfile'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete capability profile
      operationId: deleteCapabilityProfile
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/capabilities/resolve:
    post:
      summary: Resolve capability refs to agent candidates
      operationId: resolveCapability
      requestBody:
        $ref: '#/components/requestBodies/CapabilityResolveRequest'
      responses:
        '200':
          $ref: '#/components/responses/CapabilityResolution'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ================================================================
  # Capability Registry Bindings
  # ================================================================
  /v1/capability-registry-bindings:
    get:
      summary: List capability registry bindings
      operationId: listCapabilityBindings
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/CapabilityBindingList'
    post:
      summary: Create capability registry binding
      operationId: createCapabilityBinding
      requestBody:
        $ref: '#/components/requestBodies/CapabilityBindingCreate'
      responses:
        '201':
          $ref: '#/components/responses/CapabilityBinding'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/capability-registry-bindings/{id}:
    get:
      summary: Get capability registry binding
      operationId: getCapabilityBinding
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/CapabilityBinding'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete capability registry binding
      operationId: deleteCapabilityBinding
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Team Definitions
  # ================================================================
  /v1/team-definitions:
    get:
      summary: List team definitions
      operationId: listTeamDefinitions
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/TeamDefinitionList'
    post:
      summary: Create team definition
      operationId: createTeamDefinition
      requestBody:
        $ref: '#/components/requestBodies/TeamDefinitionCreate'
      responses:
        '201':
          $ref: '#/components/responses/TeamDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/team-definitions/{id}:
    get:
      summary: Get team definition
      operationId: getTeamDefinition
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/TeamDefinition'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete team definition
      operationId: deleteTeamDefinition
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Team Instances
  # ================================================================
  /v1/team-instances:
    get:
      summary: List team instances
      operationId: listTeamInstances
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/TeamInstanceList'
    post:
      summary: Create team instance
      operationId: createTeamInstance
      requestBody:
        $ref: '#/components/requestBodies/TeamInstanceCreate'
      responses:
        '201':
          $ref: '#/components/responses/TeamInstance'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/team-instances/{id}:
    get:
      summary: Get team instance
      operationId: getTeamInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/TeamInstance'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete team instance
      operationId: deleteTeamInstance
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/team-instances/{id}/tasks:
    get:
      summary: List tasks for team instance
      operationId: listTeamTasks
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/TaskList'
    post:
      summary: Create task for team instance (async)
      operationId: createTeamTask
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '202':
          description: Task created and queued asynchronously
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/team-instances/{id}/members:
    get:
      summary: List team members
      operationId: listTeamMembers
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/TeamMemberList'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/team-instances/{id}/publish:
    post:
      summary: Publish artifact to team shared state
      operationId: publishToTeam
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Published successfully
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/team-instances/{id}/supervisor/execute:
    post:
      summary: Trigger supervisor poll-and-execute cycle
      description: The supervisor agent triages pending team tasks and
        creates delegations for sub-agents.
      operationId: executeSupervisor
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Supervisor execution cycle completed
        '501':
          $ref: '#/components/responses/NotImplemented'

  # ================================================================
  # Delegations
  # ================================================================
  /v1/delegations:
    get:
      summary: List delegations
      operationId: listDelegations
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/DelegationList'
    post:
      summary: Create delegation
      operationId: createDelegation
      requestBody:
        $ref: '#/components/requestBodies/DelegationCreate'
      responses:
        '201':
          $ref: '#/components/responses/Delegation'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/delegations/{id}:
    get:
      summary: Get delegation
      operationId: getDelegation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Delegation'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/delegations/{id}/accept:
    post:
      summary: Accept delegation
      operationId: acceptDelegation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Accepted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/delegations/{id}/reject:
    post:
      summary: Reject delegation
      operationId: rejectDelegation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Rejected successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/delegations/{id}/complete:
    post:
      summary: Mark delegation as completed
      operationId: completeDelegation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Marked complete successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/delegations/{id}/fail:
    post:
      summary: Mark delegation as failed
      operationId: failDelegation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Marked failed successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Approvals
  # ================================================================
  /v1/approvals:
    get:
      summary: List approvals
      operationId: listApprovals
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/ApprovalList'

  /v1/approvals/{id}:
    get:
      summary: Get approval
      operationId: getApproval
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Approval'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/approvals/{id}/resolve:
    post:
      summary: Resolve approval (approved/rejected)
      description: Operator or human-in-the-loop resolves an approval request.
      operationId: resolveApproval
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        $ref: '#/components/requestBodies/ApprovalResolveRequest'
      responses:
        '204':
          description: Resolved successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Checkpoints
  # ================================================================
  /v1/checkpoints:
    get:
      summary: List checkpoints
      operationId: listCheckpoints
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/CheckpointList'

  /v1/checkpoints/{id}:
    get:
      summary: Get checkpoint
      operationId: getCheckpoint
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Checkpoint'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/checkpoints/{id}/restore:
    post:
      summary: Restore from checkpoint
      description: Replays events from the checkpoint and returns a recovery
        assessment. Use the result to determine whether to resume, reissue
        delegations, or escalate.
      operationId: restoreCheckpoint
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/CheckpointRestore'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/checkpoints/{id}/messages:
    get:
      summary: Get messages from checkpoint
      description: Returns the message history captured at this checkpoint,
        reconstructed from event replay.
      operationId: getCheckpointMessages
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/CheckpointMessages'
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Memory Write Candidates
  # ================================================================
  /v1/memory-write-candidates:
    get:
      summary: List memory write candidates
      operationId: listMemoryCandidates
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/MemoryCandidateList'
    post:
      summary: Create memory write candidate
      operationId: createMemoryCandidate
      requestBody:
        $ref: '#/components/requestBodies/MemoryCandidateCreate'
      responses:
        '201':
          $ref: '#/components/responses/MemoryCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/memory-write-candidates/{id}:
    get:
      summary: Get memory write candidate
      operationId: getMemoryCandidate
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/MemoryCandidate'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/memory-write-candidates/{id}/approve:
    post:
      summary: Approve memory write candidate
      description: Creates a memory entry from the candidate.
      operationId: approveMemoryCandidate
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/MemoryEntry'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/memory-write-candidates/{id}/reject:
    post:
      summary: Reject memory write candidate
      operationId: rejectMemoryCandidate
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Rejected successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/memory-write-candidates/{id}/merge:
    post:
      summary: Merge memory write candidate into an existing entry
      operationId: mergeMemoryCandidate
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        $ref: '#/components/requestBodies/CandidateMergeRequest'
      responses:
        '200':
          $ref: '#/components/responses/MemoryEntry'
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Memory Entries
  # ================================================================
  /v1/memory-entries:
    get:
      summary: List memory entries
      operationId: listMemoryEntries
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/MemoryEntryList'

  /v1/memory-entries/{id}:
    get:
      summary: Get memory entry
      operationId: getMemoryEntry
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/MemoryEntry'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/memory-entries/search:
    post:
      summary: Semantic search memory entries
      operationId: searchMemoryEntries
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                limit:
                  type: integer
                  default: 20
              required: [query]
      responses:
        '200':
          $ref: '#/components/responses/MemoryEntryList'

  /v1/memory-entries/force:
    post:
      summary: Force-create memory entry (bypass candidate flow)
      operationId: forceWriteMemory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent_instance_id:
                  type: string
                  format: uuid
                category:
                  type: string
                key:
                  type: string
                value:
                  type: object
              required: [agent_instance_id, category, key, value]
      responses:
        '201':
          $ref: '#/components/responses/MemoryEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/memory-entries/backfill:
    post:
      summary: Backfill embeddings for memory entries without them
      description: Triggers embedding generation for memory entries that
        were created before the embedding pipeline was available.
      operationId: backfillEmbeddings
      responses:
        '200':
          description: Backfill triggered
        '501':
          $ref: '#/components/responses/NotImplemented'

  # ================================================================
  # Memory Decisions (Audit)
  # ================================================================
  /v1/memory/decisions:
    get:
      summary: List memory decision log
      operationId: listMemoryDecisions
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
        - name: agent_instance_id
          in: query
          schema:
            type: string
            format: uuid
        - name: decision_type
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          $ref: '#/components/responses/MemoryDecisionList'

  /v1/memory/decisions/stats:
    get:
      summary: Get memory decision statistics
      operationId: getMemoryDecisionStats
      responses:
        '200':
          $ref: '#/components/responses/MemoryDecisionStats'

  /v1/memory/compact:
    post:
      summary: Trigger memory compaction job
      description: Starts a background job to consolidate or summarize
        memory entries. Returns a job ID for status tracking.
      operationId: triggerMemoryCompaction
      responses:
        '202':
          $ref: '#/components/responses/CompactionJob'

  # ================================================================
  # Memory Notifications (SSE)
  # ================================================================
  /v1/memory-notifications/sse:
    get:
      summary: SSE stream of memory review notifications
      description: |
        Server-sent event stream emitting real-time notifications when
        memory write candidates are created, approved, rejected, or merged.
        Events: `candidate_created`, `review_needed`, `approved`,
        `rejected`, `merged`.
      operationId: memoryNotificationsSSE
      responses:
        '200':
          description: SSE stream of notification events
          content:
            text/event-stream:
              schema:
                type: string

  # ================================================================
  # Escalations
  # ================================================================
  /v1/escalations:
    get:
      summary: List unresolved escalations
      description: Operator-facing endpoint listing escalations that
        require manual intervention.
      operationId: listEscalations
      parameters:
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/EscalationList'

  /v1/escalations/{id}:
    get:
      summary: Get escalation with recovery context
      operationId: getEscalation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Escalation'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/escalations/{id}/resolve:
    post:
      summary: Resolve an escalation
      operationId: resolveEscalation
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        $ref: '#/components/requestBodies/EscalationResolveRequest'
      responses:
        '204':
          description: Resolved successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ================================================================
  # Tool Policies
  # ================================================================
  /v1/tool-policies:
    get:
      summary: List all tool policies
      operationId: listToolPolicies
      responses:
        '200':
          $ref: '#/components/responses/ToolPolicyList'

  /v1/tool-policies/{tool_name}:
    get:
      summary: Get tool policy
      operationId: getToolPolicy
      parameters:
        - name: tool_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/ToolPolicy'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create or update tool policy
      operationId: upsertToolPolicy
      parameters:
        - name: tool_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: '#/components/requestBodies/ToolPolicyUpsert'
      responses:
        '200':
          $ref: '#/components/responses/ToolPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      summary: Delete tool policy
      operationId: deleteToolPolicy
      parameters:
        - name: tool_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

# ==================================================================
# Components
# ==================================================================
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Any non-empty value is accepted.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

    ListLimit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of items to return

    ListCursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor (opaque string from previous response)

  requestBodies:
    AgentDefinitionCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentDefinitionCreate'

    AgentInstanceCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentInstanceCreate'

    TimeTravelRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TimeTravelRequest'

    RunRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RunRequest'

    RunCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RunCreate'

    ArtifactCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ArtifactCreate'

    CapabilityProfileCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapabilityProfileCreate'

    CapabilityResolveRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapabilityResolveRequest'

    CapabilityBindingCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapabilityRegistryBindingCreate'

    TeamDefinitionCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamDefinitionCreate'

    TeamInstanceCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamInstanceCreate'

    DelegationCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DelegationCreate'

    ApprovalResolveRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApprovalResolveRequest'

    MemoryCandidateCreate:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MemoryWriteCandidateCreate'

    CandidateMergeRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CandidateMergeRequest'

    EscalationResolveRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EscalationResolveRequest'

    ToolPolicyUpsert:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ToolPolicyUpsert'

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    NotImplemented:
      description: Not yet implemented
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    AgentDefinition:
      description: Agent definition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentDefinition'

    AgentDefinitionList:
      description: List of agent definitions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseAgentDefinition'

    AgentInstance:
      description: Agent instance
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentInstance'

    AgentInstanceList:
      description: List of agent instances
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseAgentInstance'

    Task:
      description: Task
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Task'

    TaskList:
      description: List of tasks
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseTask'

    Run:
      description: Run
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Run'

    RunWebhookStatus:
      description: Webhook delivery status
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RunWebhookStatus'

    Artifact:
      description: Artifact
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Artifact'

    ArtifactList:
      description: List of artifacts
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseArtifact'

    Event:
      description: Event
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Event'

    EventList:
      description: List of events
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseEvent'

    CapabilityProfile:
      description: Capability profile
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapabilityProfile'

    CapabilityProfileList:
      description: List of capability profiles
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseCapabilityProfile'

    CapabilityResolution:
      description: Capability resolution result
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapabilityResolution'

    CapabilityBinding:
      description: Capability registry binding
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapabilityRegistryBinding'

    CapabilityBindingList:
      description: List of capability registry bindings
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseCapabilityRegistryBinding'

    TeamDefinition:
      description: Team definition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamDefinition'

    TeamDefinitionList:
      description: List of team definitions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseTeamDefinition'

    TeamInstance:
      description: Team instance
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamInstance'

    TeamInstanceList:
      description: List of team instances
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseTeamInstance'

    TeamMemberList:
      description: List of team members
      content:
        application/json:
          schema:
            type: object

    Delegation:
      description: Delegation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Delegation'

    DelegationList:
      description: List of delegations
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseDelegation'

    Approval:
      description: Approval
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Approval'

    ApprovalList:
      description: List of approvals
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseApproval'

    Checkpoint:
      description: Checkpoint
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Checkpoint'

    CheckpointList:
      description: List of checkpoints
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseCheckpoint'

    CheckpointRestore:
      description: Checkpoint restoration result
      content:
        application/json:
          schema:
            type: object

    CheckpointMessages:
      description: Messages from checkpoint
      content:
        application/json:
          schema:
            type: object

    MemoryCandidate:
      description: Memory write candidate
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MemoryWriteCandidate'

    MemoryCandidateList:
      description: List of memory write candidates
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseMemoryWriteCandidate'

    MemoryEntry:
      description: Memory entry
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MemoryEntry'

    MemoryEntryList:
      description: List of memory entries
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseMemoryEntry'

    MemoryDecisionList:
      description: List of memory decisions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseMemoryDecision'

    MemoryDecisionStats:
      description: Memory decision statistics
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MemoryDecisionStats'

    CompactionJob:
      description: Compaction job status
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CompactionJob'

    Escalation:
      description: Escalation with recovery context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Escalation'

    EscalationList:
      description: List of escalations
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseEscalation'

    ToolPolicy:
      description: Tool policy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ToolPolicy'

    ToolPolicyList:
      description: List of tool policies
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListResponseToolPolicy'

  schemas:
    # ----------------------------------------------------------------
    # Common
    # ----------------------------------------------------------------
    ErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
      required: [code, message]

    Pagination:
      type: object
      properties:
        next_cursor:
          type: string
        prev_cursor:
          type: string
        has_more:
          type: boolean
      required: [has_more]

    # ----------------------------------------------------------------
    # Agent Definitions
    # ----------------------------------------------------------------
    AgentDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        system_prompt:
          type: string
        tool_policy:
          type: object
        memory_policy:
          type: object
        delegation_policy:
          type: object
        limits:
          type: object
        default_model_policy:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, tool_policy, memory_policy, delegation_policy, limits, default_model_policy, created_at, updated_at]

    AgentDefinitionCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        system_prompt:
          type: string
        tool_policy:
          type: object
          default: {}
        memory_policy:
          type: object
          default: {}
        delegation_policy:
          type: object
          default: {}
        limits:
          type: object
          default: {}
        default_model_policy:
          type: object
          default: {}
      required: [name]

    ListResponseAgentDefinition:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentDefinition'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required: [data, pagination]

    # ----------------------------------------------------------------
    # Agent Instances
    # ----------------------------------------------------------------
    AgentInstanceStatus:
      type: string
      enum: [CREATED, HYDRATING, READY, RUNNING, WAITING_TOOL, WAITING_SUBAGENT, WAITING_APPROVAL, SUSPENDED, COMPLETED, FAILED, CANCELLED]

    AgentInstance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_definition_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/AgentInstanceStatus'
        external_context_refs:
          type: array
          items:
            type: object
        current_task_id:
          type: string
          format: uuid
        checkpoint_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, agent_definition_id, status, external_context_refs, created_at, updated_at]

    AgentInstanceCreate:
      type: object
      properties:
        agent_definition_id:
          type: string
          format: uuid
        external_context_refs:
          type: array
          items:
            type: object
          default: []
      required: [agent_definition_id]

    TimeTravelRequest:
      type: object
      properties:
        checkpoint_id:
          type: string
          format: uuid
        branch_name:
          type: string
      required: [checkpoint_id]

    ListResponseAgentInstance:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentInstance'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required: [data, pagination]

    # ----------------------------------------------------------------
    # Tasks
    # ----------------------------------------------------------------
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        goal:
          type: string
        status:
          type: string
        execution_mode:
          type: string
        agent_instance_id:
          type: string
          format: uuid
        team_instance_id:
          type: string
          format: uuid
        parent_task_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, goal, status, execution_mode, created_at, updated_at]

    ListResponseTask:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required: [data, pagination]

    # ----------------------------------------------------------------
    # Runs
    # ----------------------------------------------------------------
    RunRequest:
      type: object
      properties:
        goal:
          type: string
        instructions:
          type: string
        input_artifacts:
          type: array
          items:
            type: string
            format: uuid
        external_context_refs:
          type: array
          items:
            type: object
        constraints:
          type: object
        execution_mode:
          type: string
          enum: [interactive, sync, async]
          default: interactive
        expected_outputs:
          type: array
          items:
            type: string
        idempotency_key:
          type: string
        webhook_url:
          type: string
          format: uri
        async_execution:
          type: boolean
          default: false
      required: [goal]

    RunCreate:
      type: object
      properties:
        agent_definition_id:
          type: string
          format: uuid
        goal:
          type: string
        instructions:
          type: string
        execution_mode:
          type: string
          enum: [sync, async]
          default: sync
        webhook_url:
          type: string
          format: uri
        idempotency_key:
          type: string
      required: [agent_definition_id, goal]

    Run:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_instance_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [Queued, Running, Completed, Failed, Cancelled]
        webhook_sent_at:
          type: string
          format: date-time
        webhook_attempts:
          type: integer
        created_at:
          type: string
          format: date-time
      required: [id, status, created_at]

    RunWebhookStatus:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        webhook_url:
          type: string
        sent_at:
          type: string
          format: date-time
        attempts:
          type: integer
        delivered:
          type: boolean
      required: [run_id, delivered]

    # ----------------------------------------------------------------
    # Artifacts
    # ----------------------------------------------------------------
    ArtifactScope:
      type: string
      enum: [private, team_shared, external_published]

    Artifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
        scope:
          $ref: '#/components/schemas/ArtifactScope'
        source_instance_id:
          type: string
          format: uuid
        published_to_team_instance_id:
          type: string
          format: uuid
        mime_type:
          type: string
        size_bytes:
          type: integer
        summary:
          type: string
        content:
          type: object
        created_at:
          type: string
          format: date-time
      required: [id, kind, scope, mime_type, size_bytes, content, created_at]

    ArtifactCreate:
      type: object
      properties:
        kind:
          type: string
        scope:
          $ref: '#/components/schemas/ArtifactScope'
          default: private
        mime_type:
          type: string
        content:
          type: object
        idempotency_key:
          type: string
      required: [kind, mime_type, content]

    ListResponseArtifact:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required: [data, pagination]

    # ----------------------------------------------------------------
    # Events
    # ----------------------------------------------------------------
    Event:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
        timestamp:
          type: string
          format: date-time
