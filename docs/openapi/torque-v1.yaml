          enum: [start, chunk, tool_call, tool_result, checkpoint_created, done, error]
        data:
          type: object
      required: [event]

    RunEventStart:
      type: object
      properties:
        event:
          type: string
          enum: [start]
        instance_id:
          type: string
          format: uuid
      required: [event, instance_id]

    RunEventChunk:
      type: object
      properties:
        event:
          type: string
          enum: [chunk]
        content:
          type: string
      required: [event, content]

    RunEventToolCall:
      type: object
      properties:
        event:
          type: string
          enum: [tool_call]
        name:
          type: string
        arguments:
          type: object
      required: [event, name, arguments]

    RunEventToolResult:
      type: object
      properties:
        event:
          type: string
          enum: [tool_result]
        name:
          type: string
        success:
          type: boolean
        content:
          type: string
        error:
          type: string
      required: [event, name, success, content]

