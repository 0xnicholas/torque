        message_id:
          type: string
          format: uuid
        artifacts:
          type: object
      required: [event, message_id]

    RunEventError:
      type: object
      properties:
        event:
          type: string
          enum: [error]
        code:
          type: string
        message:
          type: string
      required: [event, code, message]
