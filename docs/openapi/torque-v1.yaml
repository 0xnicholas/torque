    # ----------------------------------------------------------------
    ToolRiskLevel:
      type: string
      enum: [Low, Medium, High, Critical]

    ToolPolicy:
      type: object
      properties:
        tool_name:
          type: string
        risk_level:
          $ref: '#/components/schemas/ToolRiskLevel'
        blocked:
          type: boolean
          default: false
        requires_approval:
          type: boolean
          default: false
        side_effects:
          type: array
          items:
            type: string
            enum: [FileSystem, Network, ExternalProcess, StateMutation, DataExfiltration, SystemLevel]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [tool_name, risk_level, created_at, updated_at]

    ToolPolicyUpsert:
      type: object
      properties:
        risk_level:
          $ref: '#/components/schemas/ToolRiskLevel'
        blocked:
